<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DONNA · TSA Run &amp; Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<aside class="sidebar">
  <div class="brand" id="brand" title="Divestiture Operations Navigator & Notification Assistant">
    <div class="brand-mark">D</div>
    <div class="brand-text">
      <span class="brand-name">DONNA</span>
      <span class="brand-sub">TSA Run &amp; Control</span>
    </div>
  </div>

  <nav class="nav" id="nav"></nav>

  <div class="sidebar-foot">
    <div class="period-pill">
      <span class="dot"></span> Reporting period · <strong>May 2026</strong>
    </div>
    <p class="acronym">Divestiture Operations<br>Navigator &amp; Notification Assistant</p>
    <img class="foot-logo" src="branding/logos/reckitt-logo-slate.png" alt="Reckitt">
  </div>
</aside>

<main class="main">
  <header class="topbar">
    <div class="topbar-left">
      <div class="eyebrow"><img class="eyebrow-logo" src="branding/logos/reckitt-logomark-pink.png" alt="Reckitt">RECKITT <em>·</em> <span class="hl">TSA INTELLIGENCE LAYER</span></div>
      <div class="source-toggle" id="sourceToggle" role="group" aria-label="Data source">
        <button type="button" class="source-seg active" data-source="excel">Excel</button>
        <button type="button" class="source-seg" data-source="smartsheet">
          Smartsheet
          <span class="source-pill">Planned</span>
        </button>
      </div>
    </div>
    <div class="topbar-right">
      <span class="connector-status" id="connectorStatus"></span>
      <button type="button" class="calibrate-btn" id="calibrateBtn" title="Calibrate DONNA">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        Calibrate
      </button>
      <span class="env-badge">DEMO · MOCK DATA</span>
      <div class="avatar" title="Donna · TSA Programme Lead">DM</div>
    </div>
  </header>

  <section id="view" class="view"></section>
</main>

<div class="cal-backdrop" id="calBackdrop"></div>
<aside class="cal-panel" id="calPanel" aria-label="DONNA calibration">
  <header class="cal-head">
    <div>
      <h2 class="cal-title">Calibrate</h2>
      <p class="cal-sub">Configuration surface — changes apply instantly in-session</p>
    </div>
    <button type="button" class="cal-close" id="calClose" aria-label="Close">&times;</button>
  </header>
  <div class="cal-body" id="calBody"></div>
</aside>

<div id="toast" class="toast" role="status"></div>

<script src="data.js"></script>
<script src="config.js"></script>
<script src="charts.js"></script>
<script src="app.js"></script>
</body>
</html>
